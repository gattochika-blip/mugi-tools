<div id="mugiApp">
<style>
  #mugiApp * { box-sizing: border-box; }
  #mugiApp {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    max-width: 480px; margin: 0 auto; padding: 14px;
    background: #faf7f2; border-radius: 18px;
  }
  #mugiApp h2 { font-size: 17px; margin: 0 0 12px; color: #3a3532; }
  #mugiApp .row { display: flex; gap: 8px; margin-bottom: 10px; }
  #mugiApp .seg { flex: 1; display: flex; border-radius: 12px; overflow: hidden; border: 1px solid #ddd6cc; }
  #mugiApp .seg button {
    flex: 1; padding: 10px 4px; border: none; background: #fff; color: #6b625a;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  #mugiApp .seg button.active { background: #d96c2f; color: #fff; }
  #mugiApp .seg.azusa button.active { background: #3e7ca6; }
  #mugiApp label { display:block; font-size: 12px; color: #8a8078; margin: 10px 0 4px; font-weight: 600; }
  #mugiApp textarea, #mugiApp input[type=text] {
    width: 100%; border: 1px solid #ddd6cc; border-radius: 10px; padding: 10px 12px;
    font-size: 15px; font-family: inherit; resize: vertical; background: #fff; color: #2e2a24;
  }
  #mugiApp textarea { min-height: 64px; }
  #mugiApp .canvasWrap { margin-top: 14px; border-radius: 14px; overflow: hidden; background: #eee; text-align:center; }
  #mugiApp .canvasWrap img { width: 100%; display: block; }
  #mugiApp .hint { font-size: 12px; color: #a99; margin-top: 8px; text-align: center; }
  #mugiApp .genBtn {
    margin-top: 12px; width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: #2e2a24; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  #mugiApp .addPanel { margin-top: 22px; border-top: 1px solid #ddd6cc; padding-top: 12px; }
  #mugiApp .addPanelHead {
    font-size: 14px; font-weight: 700; color: #6b625a; cursor: pointer; padding: 6px 2px;
  }
  #mugiApp .customRow {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border: 1px solid #ddd6cc; border-radius: 10px;
    padding: 8px 12px; margin-bottom: 6px; font-size: 13px;
  }
  #mugiApp .customRow button {
    border: none; background: #f4dede; color: #a33; border-radius: 8px;
    padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
</style>

<h2>🐾 むぎ画像メーカー</h2>

<div class="row">
  <div class="seg" id="charSeg">
    <button data-v="mugi" class="active">むぎ</button>
    <button data-v="azusa">あずさ</button>
  </div>
</div>

<div class="row" id="poseWrap">
  <div style="width:100%;">
    <label style="margin-top:0;">むぎの表情</label>
    <select id="poseSelect" style="width:100%; padding:10px 12px; border-radius:10px; border:1px solid #ddd6cc; font-size:15px; background:#fff;"></select>
  </div>
</div>

<div class="row" id="poseWrapAzusa" style="display:none;">
  <div style="width:100%;">
    <label style="margin-top:0;">あずさの表情</label>
    <select id="poseSelectAzusa" style="width:100%; padding:10px 12px; border-radius:10px; border:1px solid #ddd6cc; font-size:15px; background:#fff;"></select>
  </div>
</div>

<div class="row">
  <div class="seg" id="tplSeg">
    <button data-v="hitokoto" class="active">ひとこと</button>
    <button data-v="points">3ポイント</button>
    <button data-v="sengen">宣言</button>
  </div>
</div>

<div class="row">
  <div class="seg" id="bgSeg">
    <button data-v="warm" class="active">昼</button>
    <button data-v="cool">淡い青</button>
    <button data-v="night">夜</button>
  </div>
</div>

<div id="titleWrap" style="display:none;">
  <label>タイトル(見出し)</label>
  <input type="text" id="titleInput" placeholder="例: 新NISA、3つだけ覚えとけ">
</div>

<label>本文(3ポイントは改行で1項目ずつ・最大5つ)</label>
<textarea id="bodyInput">新NISA、枠は使わなきゃタダの紙だぜ。
今日5分でいい、設定だけしとけ。</textarea>

<label>添えことば(なくてもOK)</label>
<input type="text" id="subInput" placeholder="例: 迷ったら、まず埋める">

<label>アカウント名</label>
<input type="text" id="footerInput" value="@mugi">

<button class="genBtn" id="genBtn">🎨 画像を作る</button>

<div class="canvasWrap">
  <img id="outImg" alt="生成された画像がここに表示されます" />
</div>
<button class="genBtn" id="saveBtn" style="background:#2e7d32; margin-top:8px;">📥 この画像を保存</button>
<div class="hint">保存できない場合は、画像を長押し →「イメージを保存」</div>

<div class="addPanel">
  <div class="addPanelHead" id="addPanelToggle">＋ 新しいイラストを追加 <span id="addPanelArrow">▾</span></div>
  <div id="addPanelBody" style="display:none;">
    <label style="margin-top:10px;">追加先のキャラ</label>
    <div class="seg" id="addCharSeg">
      <button data-v="mugi" class="active">むぎ</button>
      <button data-v="azusa">あずさ</button>
    </div>
    <label>表情の名前</label>
    <input type="text" id="newPoseName" placeholder="例: 決意顔">
    <label>写真を選ぶ</label>
    <input type="file" accept="image/*" id="newPoseFile">
    <div class="hint" style="text-align:left;">白い紙に描いた写真でOK。背景の白は自動でできるだけ透明にします(iPhone標準の「被写体を切り取り」で撮った透過済み画像ならさらにきれい)。</div>
    <canvas id="newPosePreview" width="400" height="400" style="display:none; width:100%; border-radius:10px; background:repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 50% / 20px 20px;"></canvas>
    <button class="genBtn" id="addPoseBtn" style="background:#3e7ca6; display:none;">この表情を追加する</button>

    <div id="customList" style="margin-top:14px;"></div>
  </div>
</div>

<canvas id="cv" width="1080" height="1080" style="display:none;"></canvas>
</div>

  const MUGI_LABELS = {
    "どや顔_自信満々": "どや顔・自信満々", "喜び": "喜び", "怒り": "怒り", "悲しい": "悲しい",
    "驚き": "驚き", "ジト目_呆れ顔": "ジト目・呆れ顔", "ガッツポーズ_喜び": "ガッツポーズ・喜び",
    "腕組み_考え中": "腕組み・考え中", "困り顔": "困り顔"
  };
  const AZUSA_LABELS = {
    "静かな微笑み": "静かな微笑み", "考え中": "考え中", "困り顔": "困り顔", "ガッツポーズ": "ガッツポーズ"
  };
  const BUILTIN_MUGI_KEYS = Object.keys(MUGI_LABELS);
  const BUILTIN_AZUSA_KEYS = Object.keys(AZUSA_LABELS);

  // ---- カスタムイラストの読み込み(localStorage) ----
  function loadCustom(key){
    try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){ return []; }
  }
  function saveCustom(key, arr){
    localStorage.setItem(key, JSON.stringify(arr));
  }
  let customMugi = loadCustom('mugiCustomPoses');   // [{name, dataUrl}]
  let customAzusa = loadCustom('azusaCustomPoses');

  function rebuildFaceDicts(){
    customMugi.forEach(p => { MUGI_FACES[p.name] = p.dataUrl; });
    customAzusa.forEach(p => { AZUSA_FACES[p.name] = p.dataUrl; });
  }
  rebuildFaceDicts();

  function populateSelect(selectEl, builtinKeys, labels, customArr, currentVal){
    selectEl.innerHTML = '';
    builtinKeys.forEach(k=>{
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = labels[k] || k;
      selectEl.appendChild(opt);
    });
    customArr.forEach(p=>{
      const opt = document.createElement('option');
      opt.value = p.name; opt.textContent = p.name + '(追加)';
      selectEl.appendChild(opt);
    });
    if ([...selectEl.options].some(o=>o.value===currentVal)) selectEl.value = currentVal;
  }

  function refreshPoseSelects(){
    populateSelect(document.getElementById('poseSelect'), BUILTIN_MUGI_KEYS, MUGI_LABELS, customMugi, state.pose);
    populateSelect(document.getElementById('poseSelectAzusa'), BUILTIN_AZUSA_KEYS, AZUSA_LABELS, customAzusa, state.poseAzusa);
  }

  const CHAR = {
    mugi:  { name: "むぎ",  color: "#d96c2f" },
    azusa: { name: "あずさ", color: "#3e7ca6" }
  };
  const BG = {
    warm:  { bg: "#fbf4e8", ink: "#2e2a24", panel: "#ffffff", line: "rgba(46,42,36,0.16)" },
    cool:  { bg: "#edf3f7", ink: "#22313c", panel: "#ffffff", line: "rgba(34,49,60,0.16)" },
    night: { bg: "#1e2e42", ink: "#f2eee4", panel: "#2a3c54", line: "rgba(242,238,228,0.22)" }
  };

  let state = { char: "mugi", tpl: "hitokoto", bg: "warm", pose: "どや顔_自信満々", poseAzusa: "静かな微笑み" };
  const imgCache = {};

  function currentCharSrc(){
    return state.char === 'mugi' ? MUGI_FACES[state.pose] : AZUSA_FACES[state.poseAzusa];
  }

  function loadImg(src){
    return new Promise((res)=>{
      if (imgCache[src]) return res(imgCache[src]);
      const im = new Image();
      im.onload = ()=>{ imgCache[src] = im; res(im); };
      im.src = src;
    });
  }

  function setupSeg(id, key, azusaClassToggle){
    const el = document.getElementById(id);
    el.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        el.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        state[key] = btn.dataset.v;
        if (id === 'charSeg'){
          document.getElementById('bgSeg').parentElement.querySelector('.seg').classList.toggle('azusa', state.char==='azusa');
          document.getElementById('poseWrap').style.display = state.char === 'mugi' ? 'flex' : 'none';
          document.getElementById('poseWrapAzusa').style.display = state.char === 'azusa' ? 'flex' : 'none';
          const fEl = document.getElementById('footerInput');
          if (fEl.value === '@mugi' || fEl.value === '@azusa') fEl.value = state.char === 'mugi' ? '@mugi' : '@azusa';
        }
        document.getElementById('titleWrap').style.display = (state.tpl==='points'||state.tpl==='sengen') ? 'block' : 'none';
        render();
      });
    });
  }
  setupSeg('charSeg','char');
  setupSeg('tplSeg','tpl');
  setupSeg('bgSeg','bg');

  document.getElementById('poseSelect').addEventListener('change', (e)=>{
    state.pose = e.target.value;
    render();
  });
  document.getElementById('poseSelectAzusa').addEventListener('change', (e)=>{
    state.poseAzusa = e.target.value;
    render();
  });

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function wrapLines(ctx, text, font, maxWidth){
    ctx.font = font;
    const out = [];
    text.split("\n").forEach(para=>{
      let line = "";
      for (const ch of para){
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line){
          out.push(line); line = ch;
        } else { line = test; }
      }
      out.push(line);
    });
    return out;
  }

  function fitText(ctx, text, maxW, maxH, maxSize, minSize, weight){
    for (let size = maxSize; size >= minSize; size -= 2){
      const font = `${weight} ${size}px "Hiragino Sans","Yu Gothic",sans-serif`;
      const lines = wrapLines(ctx, text, font, maxW);
      const lh = size * 1.55;
      if (lines.length * lh <= maxH) return { lines, font, lh, size };
    }
    const font = `${weight} ${minSize}px "Hiragino Sans","Yu Gothic",sans-serif`;
    const lines = wrapLines(ctx, text, font, maxW);
    return { lines, font, lh: minSize*1.55, size: minSize };
  }

  function drawLines(ctx, lines, x, y, font, lh, fill, align){
    ctx.font = font; ctx.fillStyle = fill; ctx.textBaseline = 'alphabetic';
    lines.forEach((l,i)=>{
      if (align === 'center'){
        const w = ctx.measureText(l).width;
        ctx.fillText(l, x - w/2, y + i*lh + lh*0.78);
      } else {
        ctx.fillText(l, x, y + i*lh + lh*0.78);
      }
    });
    return y + lines.length*lh;
  }

  function nameTag(ctx, name, color, cx, cy){
    ctx.font = '900 34px "Hiragino Sans","Yu Gothic",sans-serif';
    const w = ctx.measureText(name).width + 56;
    ctx.fillStyle = color;
    roundRect(ctx, cx-w/2, cy, w, 60, 30); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(name, cx, cy+31);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }

  function footer(ctx, text, P, M, H){
    ctx.font = '700 30px sans-serif';
    ctx.fillStyle = P.ink; ctx.globalAlpha = 0.65;
    ctx.fillText('🐾 ' + text, M+10, H-M-24);
    ctx.globalAlpha = 1;
  }

  function frame(ctx, C, P, W, H){
    ctx.fillStyle = P.bg; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = C.color; ctx.lineWidth = 14;
    roundRect(ctx, 28,28, W-56, H-56, 34); ctx.stroke();
    ctx.strokeStyle = P.line; ctx.lineWidth = 3;
    roundRect(ctx, 52,52, W-104, H-104, 24); ctx.stroke();
  }

  async function placeChar(ctx, src, rightX, bottomY, hTarget){
    const im = await loadImg(src);
    const ratio = im.width / im.height;
    const w = hTarget * ratio;
    const x = rightX - w, y = bottomY - hTarget;
    ctx.drawImage(im, x, y, w, hTarget);
    return { x, y, w, h: hTarget };
  }

  async function renderHitokoto(ctx, W,H,M,C,P, body, sub, ftext){
    const charH = Math.min(H*0.36, 430);
    const cpos = await placeChar(ctx, currentCharSrc(), W-M-20, H-M-40, charH);
    const bx=M+10, by=M+40, bw=W-2*(M+10), bh=cpos.y-by-90;
    ctx.fillStyle=P.panel; ctx.strokeStyle=C.color; ctx.lineWidth=6;
    roundRect(ctx,bx,by,bw,bh,40); ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W-M-260, by+bh-3);
    ctx.lineTo(W-M-160, by+bh+62);
    ctx.lineTo(W-M-140, by+bh-3);
    ctx.closePath();
    ctx.fillStyle=P.panel; ctx.fill(); ctx.stroke();
    ctx.fillStyle=P.panel; ctx.fillRect(W-M-256, by+bh-8, 112, 10);

    const {lines, font, lh} = fitText(ctx, body, bw-140, bh-120, 74, 38, 700);
    const ty = by + (bh - lines.length*lh)/2;
    drawLines(ctx, lines, bx+70, ty, font, lh, P.ink);

    if (sub){
      ctx.font = '700 32px sans-serif'; ctx.fillStyle = C.color;
      ctx.fillText('― '+sub, bx+10, by+bh+120);
    }
    nameTag(ctx, C.name, C.color, cpos.x+cpos.w/2, cpos.y-8);
    footer(ctx, ftext, P, M, H);
  }

  async function renderPoints(ctx, W,H,M,C,P, title, body, sub, ftext){
    const charH = Math.min(H*0.36,430);
    let y = M+50;
    if (title){
      ctx.fillStyle=C.color; roundRect(ctx,M+10,y,W-2*(M+10),96,20); ctx.fill();
      ctx.font='900 44px "Hiragino Sans","Yu Gothic",sans-serif'; ctx.fillStyle='#fff';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(title, W/2, y+50);
      ctx.textAlign='left'; ctx.textBaseline='alphabetic';
      y += 140;
    }
    const charTopEst = H - M - 40 - charH*0.92;
    const items = body.split("\n").map(s=>s.trim()).filter(Boolean).slice(0,5);
    const availH = charTopEst - y - 40;
    const rowH = Math.min(150, availH / Math.max(items.length,1));

    items.forEach(t=>{
      ctx.fillStyle = P.panel; ctx.strokeStyle = P.line; ctx.lineWidth=3;
      roundRect(ctx, M+10, y, W-2*(M+10), rowH-18, 22); ctx.fill(); ctx.stroke();
      ctx.font = `${Math.floor(rowH*0.34)}px sans-serif`; ctx.fillStyle = '#3e7ca6';
      ctx.fillText('🐾', M+22, y + (rowH-18)/2 + rowH*0.12);
      const {lines, font, lh} = fitText(ctx, t, W-2*(M+10)-190, rowH-40, 44, 26, 700);
      const ty2 = y + ((rowH-18) - lines.length*lh)/2;
      drawLines(ctx, lines, M+130, ty2, font, lh, P.ink);
      y += rowH;
    });

    const cpos = await placeChar(ctx, currentCharSrc(), W-M-20, H-M-40, charH*0.92);
    nameTag(ctx, C.name, C.color, cpos.x+cpos.w/2, cpos.y+10);

    if (sub){
      const fw = cpos.x - M - 60;
      const {lines, font, lh} = fitText(ctx, '"'+sub+'"', fw-60, charH-80, 38, 24, 700);
      const fy = cpos.y+90, boxH = lines.length*lh+56;
      ctx.fillStyle=P.panel; ctx.strokeStyle=C.color; ctx.lineWidth=5;
      roundRect(ctx, M+10, fy, fw, boxH, 26); ctx.fill(); ctx.stroke();
      drawLines(ctx, lines, M+42, fy+28, font, lh, P.ink);
    }
    footer(ctx, ftext, P, M, H);
  }

  async function renderSengen(ctx, W,H,M,C,P, title, body, sub, ftext){
    const charH = Math.min(H*0.36,430)*0.85;
    ctx.font='700 30px sans-serif'; ctx.fillStyle=C.color; ctx.textAlign='center';
    ctx.fillText('— '+(title||'宣言')+' —', W/2, M+70);
    ctx.textAlign='left';

    const charTopEst = H-M-30-charH-56;
    const bw = W-2*(M+60), topArea = M+150, maxH = charTopEst-topArea-40;
    const {lines, font, lh} = fitText(ctx, body, bw, maxH, 78, 40, 900);
    let ty = topArea + (maxH - lines.length*lh)/2;
    ctx.textAlign='center';
    lines.forEach((l,i)=>{
      ctx.font = font; ctx.fillStyle = P.ink;
      ctx.fillText(l, W/2, ty + i*lh + lh*0.78);
    });
    ctx.textAlign='left';

    const cpos = await placeChar(ctx, currentCharSrc(), W-M-20, H-M-40, charH);

    if (sub){
      ctx.font='700 32px sans-serif'; ctx.fillStyle=C.color; ctx.textAlign='center';
      ctx.fillText(sub, W/2, cpos.y-24);
      ctx.textAlign='left';
    }
    nameTag(ctx, C.name, C.color, cpos.x+cpos.w/2, H-M-30-charH-56);
    footer(ctx, ftext, P, M, H);
  }

  async function render(){
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height, M = 70;
    const C = CHAR[state.char], P = BG[state.bg];
    ctx.clearRect(0,0,W,H);
    frame(ctx, C, P, W, H);

    const title = document.getElementById('titleInput').value;
    const body = document.getElementById('bodyInput').value;
    const sub = document.getElementById('subInput').value;
    const ftext = document.getElementById('footerInput').value || ('@'+state.char);

    if (state.tpl === 'hitokoto') await renderHitokoto(ctx,W,H,M,C,P, body, sub, ftext);
    else if (state.tpl === 'points') await renderPoints(ctx,W,H,M,C,P, title, body, sub, ftext);
    else await renderSengen(ctx,W,H,M,C,P, title, body, sub, ftext);

    document.getElementById('outImg').src = cv.toDataURL('image/png');
  }

  document.getElementById('genBtn').addEventListener('click', render);

  // ---- 画像を保存 ----
  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const cv = document.getElementById('cv');
    cv.toBlob((blob)=>{
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ts = new Date().toISOString().slice(0,10);
      a.href = url;
      a.download = `${state.char}_${state.tpl}_${ts}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 4000);
    }, 'image/png');
  });

  // ---- イラスト追加パネル ----
  let addChar = 'mugi';
  const addPanelBody = document.getElementById('addPanelBody');
  document.getElementById('addPanelToggle').addEventListener('click', ()=>{
    const open = addPanelBody.style.display !== 'none';
    addPanelBody.style.display = open ? 'none' : 'block';
    document.getElementById('addPanelArrow').textContent = open ? '▾' : '▴';
    if (!open) renderCustomList();
  });

  document.getElementById('addCharSeg').querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.getElementById('addCharSeg').querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      addChar = btn.dataset.v;
      renderCustomList();
    });
  });

  function removeWhiteBg(ctx, w, h){
    const data = ctx.getImageData(0,0,w,h);
    const d = data.data;
    const THRESH_HI = 235, THRESH_LO = 195;
    for (let i=0; i<d.length; i+=4){
      const r=d[i], g=d[i+1], b=d[i+2];
      const lum = (r+g+b)/3;
      if (lum >= THRESH_HI){
        d[i+3] = 0;
      } else if (lum > THRESH_LO){
        const t = (lum - THRESH_LO) / (THRESH_HI - THRESH_LO); // 0..1
        d[i+3] = Math.round(d[i+3] * (1 - t));
      }
    }
    ctx.putImageData(data, 0, 0);
  }

  const fileInput = document.getElementById('newPoseFile');
  const previewCv = document.getElementById('newPosePreview');
  const addPoseBtn = document.getElementById('addPoseBtn');

  fileInput.addEventListener('change', (e)=>{
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const im = new Image();
      im.onload = ()=>{
        const maxDim = 700;
        const ratio = Math.min(maxDim/im.width, maxDim/im.height, 1);
        const w = Math.round(im.width*ratio), h = Math.round(im.height*ratio);
        previewCv.width = w; previewCv.height = h;
        const ctx = previewCv.getContext('2d');
        ctx.clearRect(0,0,w,h);
        ctx.drawImage(im, 0, 0, w, h);
        // すでに透明部分がある画像(iPhoneの被写体切り取り済みなど)は加工しない
        const sample = ctx.getImageData(0,0,w,h).data;
        let hasAlpha = false;
        for (let i=3; i<sample.length; i+=4*37){ if (sample[i] < 250){ hasAlpha = true; break; } }
        if (!hasAlpha) removeWhiteBg(ctx, w, h);
        previewCv.style.display = 'block';
        addPoseBtn.style.display = 'block';
      };
      im.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  });

  addPoseBtn.addEventListener('click', ()=>{
    const name = document.getElementById('newPoseName').value.trim();
    if (!name){ alert('表情の名前を入れてください'); return; }
    const dataUrl = previewCv.toDataURL('image/png');
    const arr = addChar === 'mugi' ? customMugi : customAzusa;
    const existing = arr.findIndex(p=>p.name===name);
    if (existing >= 0) arr[existing].dataUrl = dataUrl;
    else arr.push({ name, dataUrl });
    saveCustom(addChar === 'mugi' ? 'mugiCustomPoses' : 'azusaCustomPoses', arr);
    rebuildFaceDicts();
    refreshPoseSelects();
    renderCustomList();
    document.getElementById('newPoseName').value = '';
    fileInput.value = '';
    previewCv.style.display = 'none';
    addPoseBtn.style.display = 'none';
    alert(`「${name}」を追加しました。上の${addChar==='mugi'?'むぎ':'あずさ'}の表情リストから選べます。`);
  });

  function renderCustomList(){
    const listEl = document.getElementById('customList');
    const arr = addChar === 'mugi' ? customMugi : customAzusa;
    listEl.innerHTML = '';
    if (arr.length === 0){
      listEl.innerHTML = '<div class="hint" style="text-align:left;">まだ追加したイラストはありません</div>';
      return;
    }
    arr.forEach((p, idx)=>{
      const row = document.createElement('div');
      row.className = 'customRow';
      const span = document.createElement('span');
      span.textContent = p.name;
      const btn = document.createElement('button');
      btn.textContent = '削除';
      btn.addEventListener('click', ()=>{
        if (!confirm(`「${p.name}」を削除しますか?`)) return;
        arr.splice(idx,1);
        saveCustom(addChar === 'mugi' ? 'mugiCustomPoses' : 'azusaCustomPoses', arr);
        refreshPoseSelects();
        renderCustomList();
      });
      row.appendChild(span); row.appendChild(btn);
      listEl.appendChild(row);
    });
  }

  refreshPoseSelects();
  window.addEventListener('load', render);
  render();
})();
</script>
